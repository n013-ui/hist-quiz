<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>歷史錯題練習</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    background: #f0f4f8; color: #1a1a2e; min-height: 100vh;
  }
  #app { max-width: 800px; margin: 0 auto; padding: 16px; }

  /* ── Screens ── */
  .screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 80vh; text-align: center; padding: 32px 16px;
  }
  .screen h1 { font-size: 1.9rem; margin-bottom: 12px; color: #1d4e89; }
  .screen p  { font-size: 1.05rem; color: #555; margin-bottom: 24px; line-height: 1.7; }
  .badge {
    background: #1d4e89; color: white; border-radius: 50%;
    width: 96px; height: 96px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem; margin-bottom: 24px;
  }

  /* ── Progress ── */
  #progress-wrap {
    background: #dde; border-radius: 999px; height: 10px;
    margin-bottom: 6px; overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #5b9bd5, #1d4e89);
    border-radius: 999px; transition: width .4s ease;
  }
  #progress-label { font-size: 0.82rem; color: #666; margin-bottom: 14px; }
  #round-badge { text-align: center; font-size: 0.82rem; color: #888; margin-bottom: 7px; }

  /* ── Card ── */
  #card {
    background: white; border-radius: 20px; padding: 22px 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08); margin-bottom: 14px;
  }
  #section-tag {
    display: inline-block; background: #dbeafe; color: #1d4e89;
    font-size: 0.78rem; padding: 3px 12px; border-radius: 999px;
    margin-bottom: 10px; font-weight: 700;
  }
  #group-context {
    background: #f8f9fa; border-left: 4px solid #5b9bd5;
    padding: 10px 14px; margin-bottom: 14px; border-radius: 0 8px 8px 0;
    font-size: 0.93rem; line-height: 1.75;
  }
  #group-context img { max-width: 100%; border-radius: 6px; margin: 6px 0; display: block; }
  #question-stem { font-size: 1.03rem; line-height: 1.85; margin-bottom: 18px; }
  #question-stem img { max-width: 100%; border-radius: 8px; margin: 8px 0; display: block; }

  /* ── Options ── */
  #options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: flex-start; gap: 10px;
    background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 12px;
    padding: 13px 14px; font-size: 0.98rem; cursor: pointer;
    text-align: left; transition: all .18s; width: 100%; line-height: 1.6;
  }
  .opt-btn .lbl {
    background: #e0e0e0; color: #555; border-radius: 7px;
    min-width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.88rem; flex-shrink: 0; transition: all .18s;
  }
  .opt-btn.selected   { border-color: #457b9d; background: #dbeafe; }
  .opt-btn.selected .lbl { background: #457b9d; color: white; }
  .opt-btn.correct    { border-color: #1d4e89; background: #dbeafe; }
  .opt-btn.correct .lbl { background: #1d4e89; color: white; }
  .opt-btn.wrong      { border-color: #e63946; background: #ffe0e3; }
  .opt-btn.wrong .lbl { background: #e63946; color: white; }
  .opt-btn.reveal     { border-color: #1d4e89; background: #dbeafe; }
  .opt-btn.reveal .lbl { background: #1d4e89; color: white; }

  /* 圖片選項模式 */
  #img-opt-display { margin-bottom: 14px; line-height: 1.8; font-size: 0.98rem; }
  #img-opt-display img { max-width: 100%; border-radius: 6px; margin: 6px 0; display: block; }
  .abcd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .abcd-btn {
    padding: 16px; font-size: 1.15rem; font-weight: 700;
    background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 12px;
    cursor: pointer; transition: all .18s;
  }
  .abcd-btn.selected  { border-color: #457b9d; background: #dbeafe; color: #1d3557; }
  .abcd-btn.correct   { border-color: #1d4e89; background: #dbeafe; color: #1d4e89; }
  .abcd-btn.wrong     { border-color: #e63946; background: #ffe0e3; color: #e63946; }
  .abcd-btn.reveal    { border-color: #1d4e89; background: #dbeafe; color: #1d4e89; }

  /* ── Confirm button ── */
  #confirm-btn {
    width: 100%; padding: 17px; font-size: 1.05rem; font-weight: 700;
    background: #457b9d; color: white; border: none; border-radius: 14px;
    cursor: pointer; display: none; margin-top: 12px; transition: background .2s;
  }
  #confirm-btn:active { background: #1d3557; }

  /* ── Feedback ── */
  #feedback {
    border-radius: 12px; padding: 13px 16px; margin-top: 12px;
    font-size: 1rem; font-weight: 600; display: none;
  }
  #feedback.ok  { background: #dbeafe; color: #1d3557; }
  #feedback.err { background: #ffe0e3; color: #9b2226; }

  /* ── Guessed button ── */
  #guessed-btn {
    width: 100%; padding: 11px 14px; font-size: 0.9rem; font-weight: 600;
    background: white; color: #d97706; border: 2px solid #fbbf24;
    border-radius: 12px; cursor: pointer; display: none; margin-top: 8px;
    transition: all .18s; text-align: left;
  }
  #guessed-btn.marked { color: #9ca3af; border-color: #d1d5db; cursor: default; }

  /* ── Next button ── */
  #next-btn {
    width: 100%; padding: 17px; font-size: 1.05rem; font-weight: 700;
    background: #1d4e89; color: white; border: none; border-radius: 14px;
    cursor: pointer; display: none; margin-top: 12px; transition: background .2s;
  }
  #next-btn:active { background: #0f2d50; }

  /* ── Shared button styles ── */
  .big-btn {
    padding: 17px 38px; font-size: 1.05rem; font-weight: 700;
    background: #1d4e89; color: white; border: none;
    border-radius: 14px; cursor: pointer; transition: background .2s;
  }
  .big-btn:active { background: #0f2d50; }
  .big-btn.sec {
    background: white; color: #1d4e89; border: 2px solid #1d4e89;
  }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn-col { display: flex; flex-direction: column; gap: 10px; align-items: center; width: 100%; max-width: 320px; }
  .btn-col .big-btn { width: 100%; }

  /* ── Stats ── */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin: 20px 0; width: 100%; max-width: 300px;
  }
  .stat-box {
    background: white; border-radius: 16px; padding: 16px;
    text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .stat-box .num { font-size: 1.9rem; font-weight: 900; color: #1d4e89; }
  .stat-box .lbl { font-size: 0.78rem; color: #888; margin-top: 3px; }

  .hidden { display: none !important; }

  /* ── Save button (fixed top-right) ── */
  #save-btn {
    position: fixed; top: 14px; right: 14px; z-index: 200;
    background: #7b2d00; color: white; border: none; border-radius: 10px;
    padding: 9px 16px; font-size: 0.88rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.25);
    transition: background .15s;
  }
  #save-btn:active { background: #4a1a00; }
  #save-btn.saved  { background: #27ae60; }
</style>
</head>
<body>
<button id="save-btn" class="hidden" onclick="saveProgress()">💾 暫存進度</button>
<div id="app">

  <!-- ─── 開始畫面 ─── -->
  <div id="start-screen" class="screen">
    <div class="badge">📜</div>
    <h1>歷史錯題練習</h1>
    <p>共 <strong id="total-count"></strong> 題<br>
       答錯的題目會自動回收，直到全部答對為止</p>
    <div class="btn-col" style="margin-top:4px;">
      <button class="big-btn" onclick="startQuiz()">開始練習</button>
      <button id="restore-btn" class="big-btn sec hidden" onclick="restoreProgress()">↩ 繼續上次進度</button>
    </div>
  </div>

  <!-- ─── 答題畫面 ─── -->
  <div id="quiz-screen" class="hidden">
    <div id="round-badge"></div>
    <div id="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>
    <div id="progress-label"></div>
    <div id="card">
      <div id="section-tag"></div>
      <div id="group-context" class="hidden"></div>
      <div id="question-stem"></div>
      <div id="options"></div>
    </div>
    <button id="confirm-btn" onclick="confirmAnswer()">確認送出</button>
    <div id="feedback"></div>
    <button id="guessed-btn" onclick="markAsGuessed()">🎲 我是用猜的，加入回收</button>
    <button id="next-btn" onclick="nextQuestion()">下一題 →</button>
  </div>

  <!-- ─── 每輪結束畫面 ─── -->
  <div id="round-end-screen" class="screen hidden">
    <div class="badge" id="re-emoji">📝</div>
    <h1 id="re-title">第一輪完成</h1>
    <p id="re-desc"></p>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="num" id="re-total"></div>
        <div class="lbl">本輪題數</div>
      </div>
      <div class="stat-box">
        <div class="num" id="re-correct" style="color:#1d4e89;"></div>
        <div class="lbl">答對</div>
      </div>
      <div class="stat-box">
        <div class="num" id="re-wrong" style="color:#e63946;"></div>
        <div id="re-wrong-lbl" class="lbl">答錯（回收）</div>
      </div>
      <div class="stat-box">
        <div class="num" id="re-rounds"></div>
        <div class="lbl">目前輪數</div>
      </div>
    </div>
    <div class="btn-col">
      <button class="big-btn" id="re-next-btn" onclick="startNextRound()">開始第二輪</button>
      <button class="big-btn sec" id="re-export-btn" onclick="exportRoundPDF()">📥 儲存本輪錯題</button>
      <button class="big-btn sec" id="re-restart-btn" onclick="restartQuiz()" style="border-color:#aaa;color:#888;">全部重練</button>
    </div>
  </div>

</div>

　(Ｄ)原住民正名運動的蓬勃發展。", "grp_n": null, "sub_n": null, "answer": "A", "id": 7}, {"section": "【歷史6-2】", "type": "mc", "group_context": "", "stem": "「山胞」之名，乍聽之下，有身分階級之分，現今中華民國政府，已用「原住民」之名取代「山胞」，以達公平、中立、尊重的目的。臺灣史上何時曾出現過「山胞」之名稱？", "opts": {"A": "清帝國統治前期", "B": "日治時期", "C": "戰後初期", "D": "民國　80　年代。"}, "full_html": "「山胞」之名，乍聽之下，有身分階級之分，現今中華民國政府，已用「原住民」之名取代「山胞」，以達公平、中立、尊重的目的。臺灣史上何時曾出現過「山胞」之名稱？　\n(Ａ)清帝國統治前期　(Ｂ)日治時期　(Ｃ)戰後初期　(Ｄ)民國　80　年代。", "grp_n": null, "sub_n": null, "answer": "C", "id": 8}, {"section": "【歷史6-2】", "type": "mc", "group_context": "", "stem": "現今臺灣政治、社會逐漸開放，文化朝向多元發展。臺灣於何時興起社會運動的風潮？", "opts": {"A": "民國　60　年代", "B": "民國　70　年代", "C": "民國　80　年代", "D": "民國　90　年代。"}, "full_html": "現今臺灣政治、社會逐漸開放，文化朝向多元發展。臺灣於何時興起社會運動的風潮？　\n(Ａ)民國　60　年代　(Ｂ)民國　70　年代　(Ｃ)民國　80　年代　(Ｄ)民國　90　年代。", "grp_n": null, "sub_n": null, "answer": "B", "id": 9}, {"section": "【歷史6-2】", "type": "mc", "group_context": "", "stem": "下列是臺灣某時期對於訂定街道名稱的規定，根據內容判斷，頒布此一規定的最可能是下列何者？【107　年會考】\n一、街道名稱具有紀念日本人物、展現日本國威、明顯為日本名稱者，應予改正。\n二、新街道名稱應具有下列意義：\n　　‧發揚中華民族精神：信義路、和平路等。\n　　‧宣傳三民主義：三民路、民權路等。\n　　‧紀念國家偉大人物：中山路等。", "opts": {"A": "臺灣府", "B": "臺灣總督府", "C": "臺灣省行政長官公署", "D": "荷蘭　聯合東印度公司"}, "full_html": "下列是臺灣某時期對於訂定街道名稱的規定，根據內容判斷，頒布此一規定的最可能是下列何者？【107　年會考】\n一、街道名稱具有紀念日本人物、展現日本國威、明顯為日本名稱者，應予改正。\n二、新街道名稱應具有下列意義：\n　　‧發揚中華民族精神：信義路、和平路等。\n　　‧宣傳三民主義：三民路、民權路等。\n　　‧紀念國家偉大人物：中山路等。", "grp_n": null, "sub_n": null, "answer": "C", "id": 10}, {"section": "【歷史6-2】", "type": "mc", "group_context": "", "stem": "民國　50～60　年代是臺灣經濟起飛的年代，隨著所謂的「臺灣錢淹腳目」，人民也付出相當的代價。這些代價中不包括下列何者？", "opts": {"A": "空氣汙染", "B": "國民所得增加", "C": "工廠環保問題", "D": "勞工權益受損。"}, "full_html": "民國　50～60　年代是臺灣經濟起飛的年代，隨著所謂的「臺灣錢淹腳目」，人民也付出相當的代價。這些代價中不包括下列何者？　\n(Ａ)空氣汙染　(Ｂ)國民所得增加　(Ｃ)工廠環保問題　(Ｄ)勞工權益受損。", "grp_n": null, "sub_n": null, "answer": "B", "id": 11}, {"section": "【歷史6-2】", "type": "mc", "group_context": "", "stem": "《異鄉寂寞瞑》是一首臺語歌曲，內容提到主角看著月亮及街上成雙成對的人們，想到自己一個人到城市打拼，不知道在鄉下老家的情人是否和他有一樣寂寞的心情，或是已經離他而去。歌詞中表現出臺灣戰後社會的變化。歌詞敘述的情境所產生的問題不包括下列何者？", "opts": {"A": "許多鄉村的壯年人口移至城市找尋工作", "B": "農村人口老化情形嚴重", "C": "鄉村因為人口外移所以汙染較少，生活環境較佳", "D": "經濟發展由農業社會轉型為工業社會。"}, "full_html": "《異鄉寂寞瞑》是一首臺語歌曲，內容提到主角看著月亮及街上成雙成對的人們，想到自己一個人到城市打拼，不知道在鄉下老家的情人是否和他有一樣寂寞的心情，或是已經離他而去。歌詞中表現出臺灣戰後社會的變化。歌詞敘述的情境所產生的問題不包括下列何者？　\n(Ａ)許多鄉村的壯年人口移至城市找尋工作　(Ｂ)農村人口老化情形嚴重　(Ｃ)鄉村因為人口外移所以汙染較少，生活環境較佳　(Ｄ)經濟發展由農業社會轉型為工業社會。", "grp_n": null, "sub_n": null, "answer": "C", "id": 12}, {"section": "【歷史6-2】", "type": "mc", "group_context": "", "stem": "嘉義縣阿里山鄉原名為吳鳳鄉，以紀念歷史人物吳鳳。吳鳳是清帝國時期阿里山的官員，為了讓當地原住民停止獵人頭的習俗而自願犧牲，其義行感動了原住民，從此阿里山原住民改變了獵人頭的習俗。該故事被鄒族部落長期質疑其真實性，並認為帶有羞辱和歧視意味，故爆發吳鳳雕像遭到破壞的事件。而在此事件後，政府決定更改地名，教育部也將吳鳳故事從教科書中拿掉。吳鳳雕像破壞事件最可能發生在何時？", "opts": {"A": "解嚴後", "B": "白色恐怖時期", "C": "戒嚴時期", "D": "日治時期。"}, "full_html": "嘉義縣阿里山鄉原名為吳鳳鄉，以紀念歷史人物吳鳳。吳鳳是清帝國時期阿里山的官員，為了讓當地原住民停止獵人頭的習俗而自願犧牲，其義行感動了原住民，從此阿里山原住民改變了獵人頭的習俗。該故事被鄒族部落長期質疑其真實性，並認為帶有羞辱和歧視意味，故爆發吳鳳雕像遭到破壞的事件。而在此事件後，政府決定更改地名，教育部也將吳鳳故事從教科書中拿掉。吳鳳雕像破壞事件最可能發生在何時？　\n(Ａ)解嚴後　(Ｂ)白色恐怖時期　(Ｃ)戒嚴時期　(Ｄ)日治時期。", "grp_n": null, "sub_n": null, "answer": "A", "id": 13}, {"section": "【歷史6-2】", "type": "mc", "group_context": "", "stem": "隨著環保意識抬頭，臺灣的環保運動興起，其中包括反六輕運動。環保運動興起的背景正好是臺灣經濟處於哪一個階段？", "opts": {"A": "土地改革", "B": "進口替代", "C": "十大建設", "D": "產業升級。"}, "full_html": "隨著環保意識抬頭，臺灣的環保運動興起，其中包括反六輕運動。環保運動興起的背景正好是臺灣經濟處於哪一個階段？　\n(Ａ)土地改革　(Ｂ)進口替代　(Ｃ)十大建設　(Ｄ)產業升級。", "grp_n": null, "sub_n": null, "answer": "D", "id": 14}, {"section": "【歷史6-2】", "type": "mc", "group_context": "", "stem": "喜愛文學的敏玉，對民國　60　年代的鄉土文學作品很有興趣，例如：黃春明的《兒子的大玩偶》、王拓的《金水嬸》等。此時臺灣知識分子開始關懷臺灣本土，這與當時的哪一社會背景有關？", "opts": {"A": "臺灣經濟高度發展", "B": "內政外交面臨挑戰", "C": "人民反共意識高漲", "D": "政府提倡使用方言。"}, "full_html": "喜愛文學的敏玉，對民國　60　年代的鄉土文學作品很有興趣，例如：黃春明的《兒子的大玩偶》、王拓的《金水嬸》等。此時臺灣知識分子開始關懷臺灣本土，這與當時的哪一社會背景有關？　\n(Ａ)臺灣經濟高度發展　(Ｂ)內政外交面臨挑戰　(Ｃ)人民反共意識高漲　(Ｄ)政府提倡使用方言。", "grp_n": null, "sub_n": null, "answer": "B", "id": 15}, {"section": "【歷史6-2】", "type": "mc", "group_context": "", "stem": "以下為臺灣流行文化演變四個階段的歌詞，其中哪首歌曲出現的時間為解嚴以後？\n甲：我們愛國旗，向您行最敬禮，青天白日滿地紅，莊嚴神聖又美麗。我們愛國旗，向您行最敬禮，青天白日滿地紅，飛舞在蔚藍的晴空裡。\n乙：池塘裡水滿了，雨也停了。田邊的稀泥裡到處是泥鰍。天天我等著你，等著你捉泥鰍。大哥哥好不好，咱們去捉泥鰍。小牛的哥哥帶著他捉泥鰍。大哥哥好不好，咱們去捉泥鰍。\n丙：作陣來軋車，作陣來軋車，不管伊警察底抓，不管伊父母底罵。只要我引擎催落，無人可當甲我軋，在這我最快最趴最大。\n丁：九條好漢在一班，九條好漢在一班，說打就打，說幹就幹，管它流血和流汗；管它流血和流汗。", "opts": {"A": "甲", "B": "乙", "C": "丙", "D": "丁。"}, "full_html": "以下為臺灣流行文化演變四個階段的歌詞，其中哪首歌曲出現的時間為解嚴以後？\n甲：我們愛國旗，向您行最敬禮，青天白日滿地紅，莊嚴神聖又美麗。我們愛國旗，向您行最敬禮，青天白日滿地紅，飛舞在蔚藍的晴空裡。\n乙：池塘裡水滿了，雨也停了。田邊的稀泥裡到處是泥鰍。天天我等著你，等著你捉泥鰍。大哥哥好不好，咱們去捉泥鰍。小牛的哥哥帶著他捉泥鰍。大哥哥好不好，咱們去捉泥鰍。\n丙：作陣來軋車，作陣來軋車，不管伊警察底抓，不管伊父母底罵。只要我引擎催落，無人可當甲我軋，在這我最快最趴最大。\n丁：九條好漢在一班，九條好漢在一班，說打就打，說幹就幹，管它流血和流汗；管它流血和流汗。", "grp_n": null, "sub_n": null, "answer": "C", "id": 16}, {"section": "【歷史5-1】", "type": "mc", "group_context": "", "stem": "岳爺爺說他小時候曾穿過美援麵粉袋縫製的內褲，上面還畫有兩國國旗，他們也曾為了領取美國救濟的奶粉、麵粉，而上教堂去聽外國的傳教士傳教。上述岳爺爺所說的現象，應該是出現在哪一個年代？", "opts": {"A": "民國　20　年代", "B": "民國　30　年代", "C": "民國　40　年代", "D": "民國　60　年代。"}, "full_html": "岳爺爺說他小時候曾穿過美援麵粉袋縫製的內褲，上面還畫有兩國國旗，他們也曾為了領取美國救濟的奶粉、麵粉，而上教堂去聽外國的傳教士傳教。上述岳爺爺所說的現象，應該是出現在哪一個年代？　\n(Ａ)民國　20　年代　(Ｂ)民國　30　年代　(Ｃ)民國　40　年代　(Ｄ)民國　60　年代。", "grp_n": null, "sub_n": null, "answer": "C", "id": 17}, {"section": "【歷史5-1】", "type": "mc", "group_context": "", "stem": "年朝鮮半島爆發戰爭，聯合國授權多國部隊支援，中華人民共和國亦出兵支援北韓，並提出「抗美援朝、保家衛國」等口號。下列關於上述這場戰役及影響的說明，何者敘述錯誤？", "opts": {"A": "聯合國派出以美國為首的盟軍協助南韓", "B": "此戰役最終由南韓完成朝鮮半島統一", "C": "美國派遣第七艦隊協防臺灣海峽", "D": "戰爭爆發後美國提供我國軍事、經濟援助。"}, "full_html": "年朝鮮半島爆發戰爭，聯合國授權多國部隊支援，中華人民共和國亦出兵支援北韓，並提出「抗美援朝、保家衛國」等口號。下列關於上述這場戰役及影響的說明，何者敘述錯誤？　\n(Ａ)聯合國派出以美國為首的盟軍協助南韓　(Ｂ)此戰役最終由南韓完成朝鮮半島統一　(Ｃ)美國派遣第七艦隊協防臺灣海峽　(Ｄ)戰爭爆發後美國提供我國軍事、經濟援助。", "grp_n": null, "sub_n": null, "answer": "B", "id": 18}, {"section": "【歷史5-1】", "type": "mc", "group_context": "", "stem": "謝老師回憶：「在我中學的時候，我國的外交遇到重大挫折，被迫退出聯合國，甚至之後日本、美國等友邦也陸續與我國斷交。」後來政府的因應，是在民國　70　年代晚期推動哪一外交政策，強調我國可以透過經濟實力、政治民主化來突破中華人民共和國的外交封鎖？", "opts": {"A": "活路外交", "B": "鞏固外交", "C": "彈性外交", "D": "務實外交。"}, "full_html": "謝老師回憶：「在我中學的時候，我國的外交遇到重大挫折，被迫退出聯合國，甚至之後日本、美國等友邦也陸續與我國斷交。」後來政府的因應，是在民國　70　年代晚期推動哪一外交政策，強調我國可以透過經濟實力、政治民主化來突破中華人民共和國的外交封鎖？　\n(Ａ)活路外交　(Ｂ)鞏固外交　(Ｃ)彈性外交　(Ｄ)務實外交。", "grp_n": null, "sub_n": null, "answer": "D", "id": 19}, {"section": "【歷史5-1】", "type": "mc", "group_context": "", "stem": "退出聯合國後，我國面臨國際孤立的衝擊，為突破困境，所採取的外交政策為何？", "opts": {"A": "鞏固外交", "B": "彈性外交", "C": "強硬外交", "D": "務實外交。"}, "full_html": "退出聯合國後，我國面臨國際孤立的衝擊，為突破困境，所採取的外交政策為何？　\n(Ａ)鞏固外交　(Ｂ)彈性外交　(Ｃ)強硬外交　(Ｄ)務實外交。", "grp_n": null, "sub_n": null, "answer": "B", "id": 20}, {"section": "【歷史5-1】", "type": "mc", "group_context": "", "stem": "「民國　62　年，中東國家宣布石油禁運，油價暴漲，石油危機爆發，造成世界性的經濟蕭條，在這波經濟衰退中，臺灣也深受影響。當時的臺灣剛剛經歷外交上的重大挫折，形勢孤立，因此政府決定發展重工業，以造就自立的經濟體系。」上述的外交挫折後續造成何種國際現象？", "opts": {"A": "友邦紛紛與我國斷交", "B": "中華人民共和國與美國斷交", "C": "美國提供軍事及經濟援助", "D": "與美國簽訂《臺灣關係法》。"}, "full_html": "「民國　62　年，中東國家宣布石油禁運，油價暴漲，石油危機爆發，造成世界性的經濟蕭條，在這波經濟衰退中，臺灣也深受影響。當時的臺灣剛剛經歷外交上的重大挫折，形勢孤立，因此政府決定發展重工業，以造就自立的經濟體系。」上述的外交挫折後續造成何種國際現象？　\n(Ａ)友邦紛紛與我國斷交　(Ｂ)中華人民共和國與美國斷交　(Ｃ)美國提供軍事及經濟援助　(Ｄ)與美國簽訂《臺灣關係法》。", "grp_n": null, "sub_n": null, "answer": "A", "id": 21}, {"section": "【歷史5-1】", "type": "mc", "group_context": "", "stem": "「抗美援朝」是中華人民共和國在　1950　年推出的政策，用意在支援北韓的戰爭。當時臺灣在國際間的局勢為何？", "opts": {"A": "採取親美路線，獲得美國援助", "B": "和中華人民共和國站同一陣線", "C": "獲得許多來自共產國際的援助", "D": "被納入反民主防衛體系的一環。"}, "full_html": "「抗美援朝」是中華人民共和國在　1950　年推出的政策，用意在支援北韓的戰爭。當時臺灣在國際間的局勢為何？　\n(Ａ)採取親美路線，獲得美國援助　(Ｂ)和中華人民共和國站同一陣線　(Ｃ)獲得許多來自共產國際的援助　(Ｄ)被納入反民主防衛體系的一環。", "grp_n": null, "sub_n": null, "answer": "A", "id": 22}, {"section": "【歷史5-1】", "type": "mc", "group_context": "", "stem": "「抗美援朝」是中華人民共和國在　1950　年推出的政策，用意在支援北韓與南韓的戰爭。關於上述這場戰役與後續，下列敘述何者錯誤？", "opts": {"A": "聯合國派出以美國為首的盟軍協助南韓", "B": "此役最終由南韓獲勝", "C": "美國派遣第七艦隊協防臺灣海峽", "D": "美國提供我國軍事、經濟援助十餘年。"}, "full_html": "「抗美援朝」是中華人民共和國在　1950　年推出的政策，用意在支援北韓與南韓的戰爭。關於上述這場戰役與後續，下列敘述何者錯誤？　\n(Ａ)聯合國派出以美國為首的盟軍協助南韓　(Ｂ)此役最終由南韓獲勝　(Ｃ)美國派遣第七艦隊協防臺灣海峽　(Ｄ)美國提供我國軍事、經濟援助十餘年。", "grp_n": null, "sub_n": null, "answer": "B", "id": 23}, {"section": "【歷史5-1】", "type": "mc", "group_context": "", "stem": "民國　60　年發生一件舉國震驚的大事，當時臺灣民眾普遍認為美國總統尼克森拋棄了中華民國這個昔日盟友去擁抱中共。上述這起大事為何？", "opts": {"A": "政府遷臺", "B": "簽訂《中美共同防禦條約》", "C": "臺灣退出聯合國", "D": "美國與我國斷交。"}, "full_html": "民國　60　年發生一件舉國震驚的大事，當時臺灣民眾普遍認為美國總統尼克森拋棄了中華民國這個昔日盟友去擁抱中共。上述這起大事為何？　\n(Ａ)政府遷臺　(Ｂ)簽訂《中美共同防禦條約》　(Ｃ)臺灣退出聯合國　(Ｄ)美國與我國斷交。", "grp_n": null, "sub_n": null, "answer": "C", "id": 24}, {"section": "【歷史5-1】", "type": "group", "group_context": "請根據以下兩則資料，回答下列問題：<br>資料一：茲重申其對聯合國憲章之宗旨與原則之信心，及其與所有人民及政府和平相處之願望，並欲增強西太平洋區域之和平結構……；並願加強兩國為維護和平與安全而建立集體防禦之現有努力，以待西太平洋區域更廣泛之區域安全制度之發展。<br>資料二：由於美國總統已終止美國和臺灣統治當局（在　1979　年　1　月　1　日前美國承認其為中華民國）間的政府關係，美國國會認為有必要制訂本法：有助於維持西太平洋地區的和平、安全及穩定；授權繼續維持美國人民及臺灣人民間的商務、文化及其他各種關係，以促進美國外交政策的推行……。", "stem": "從資料一到資料二的變化，最可能因為下列哪一歷史事件的發生？", "opts": {"A": "中華民國退出聯合國", "B": "中華人民共和國與美國建交", "C": "兩岸開放交流", "D": "八二三炮戰。"}, "full_html": "從資料一到資料二的變化，最可能因為下列哪一歷史事件的發生？　(Ａ)中華民國退出聯合國　(Ｂ)中華人民共和國與美國建交　(Ｃ)兩岸開放交流　(Ｄ)八二三炮戰。", "grp_n": 1, "sub_n": 3, "answer": "B", "id": 25}, {"section": "【歷史5-1】", "type": "group", "group_context": "有一份聯合國的決議案裡提到：「大會回顧《聯合國憲章》的原則，考慮到恢復中華人民共和國的合法權利，……承認中華人民共和國政府的代表是中國在聯合國組織的唯一合法代表，……決定恢復中華人民共和國的一切權利，承認它的政府代表為中國在聯合國組織的唯一合法代表。」請問：", "stem": "承第(１)題，當時我國是由何人擔任總統？", "opts": {"A": "陳水扁", "B": "李登輝", "C": "蔣經國", "D": "蔣中正。"}, "full_html": "承第(１)題，當時我國是由何人擔任總統？　(Ａ)陳水扁　(Ｂ)李登輝　(Ｃ)蔣經國　(Ｄ)蔣中正。", "grp_n": 2, "sub_n": 2, "answer": "D", "id": 26}, {"section": "【歷史5-1】", "type": "group", "group_context": "戒嚴時期，政府的反共宣傳與愛國教育深入人民的生活，藉以塑造人民的民族精神、對國家和領袖的效忠，當時留下的標語、歌曲與電影，具體而微的呈現了戒嚴時期的社會風貌。<br>　　「保密防諜」乃全民活動：民國　40　年代，政府推行「保密防諜、人人有責」的政策，工廠、學校、公務機關常見「小心匪諜」的相關標語與圖畫。政府透過宣傳告誡人民不要任意談論自己的工作內容，同時若發現「言行有異」的人，要向政府單位檢舉。<br>　　查禁歌曲與愛國歌曲：民國　50～60　年代，政府透過新聞檢查查禁許多歌曲，遭禁的理由有「為匪宣傳」、「靡靡之音」等。接著政府開始推廣如〈臺灣好〉、〈梅花〉、〈中華民國頌〉等愛國歌曲，又稱「淨化歌曲」，目的是培養人民的愛國精神，歌曲內容必須「健康」、「積極」，能夠激勵人心。當時的歌手亦須配合演唱愛國歌曲才能保有「歌星證」，新聞局也要求電視節目的演唱歌曲需有三分之一為愛國歌曲。<br>　　愛國電影：民國　60　年代，臺灣在外交上歷經退出聯合國、與美國斷交等衝擊，在國內又逢蔣中正辭世的變局，在這樣的時局下，開拍多部「愛國電影」，以激勵人民「莊敬自強、處變不驚」。這些愛國電影多數描述中國艱苦而英勇抗日的精神，以鼓舞民心、激發人民的愛國情操，電影《梅花》、《八百壯士》即為當時的代表作。請問：", "stem": "民國　50～60　年代，許多歌曲遭到政府查禁，歌曲不可流露「為匪宣傳」、「詞意頹喪」、「幽怨哀傷」之意。依據這個原則，下列哪一首歌在當時很可能被列為禁歌？", "opts": {"A": "〈臺灣好〉", "B": "〈桃花舞春風〉", "C": "〈梅花〉", "D": "〈只要為你活一天〉。"}, "full_html": "民國　50～60　年代，許多歌曲遭到政府查禁，歌曲不可流露「為匪宣傳」、「詞意頹喪」、「幽怨哀傷」之意。依據這個原則，下列哪一首歌在當時很可能被列為禁歌？　(Ａ)〈臺灣好〉　(Ｂ)〈桃花舞春風〉　(Ｃ)〈梅花〉　(Ｄ)〈只要為你活一天〉。", "grp_n": 3, "sub_n": 2, "answer": "D", "id": 27}, {"section": "【歷史5-1】", "type": "group", "group_context": "戒嚴時期，政府的反共宣傳與愛國教育深入人民的生活，藉以塑造人民的民族精神、對國家和領袖的效忠，當時留下的標語、歌曲與電影，具體而微的呈現了戒嚴時期的社會風貌。<br>　　「保密防諜」乃全民活動：民國　40　年代，政府推行「保密防諜、人人有責」的政策，工廠、學校、公務機關常見「小心匪諜」的相關標語與圖畫。政府透過宣傳告誡人民不要任意談論自己的工作內容，同時若發現「言行有異」的人，要向政府單位檢舉。<br>　　查禁歌曲與愛國歌曲：民國　50～60　年代，政府透過新聞檢查查禁許多歌曲，遭禁的理由有「為匪宣傳」、「靡靡之音」等。接著政府開始推廣如〈臺灣好〉、〈梅花〉、〈中華民國頌〉等愛國歌曲，又稱「淨化歌曲」，目的是培養人民的愛國精神，歌曲內容必須「健康」、「積極」，能夠激勵人心。當時的歌手亦須配合演唱愛國歌曲才能保有「歌星證」，新聞局也要求電視節目的演唱歌曲需有三分之一為愛國歌曲。<br>　　愛國電影：民國　60　年代，臺灣在外交上歷經退出聯合國、與美國斷交等衝擊，在國內又逢蔣中正辭世的變局，在這樣的時局下，開拍多部「愛國電影」，以激勵人民「莊敬自強、處變不驚」。這些愛國電影多數描述中國艱苦而英勇抗日的精神，以鼓舞民心、激發人民的愛國情操，電影《梅花》、《八百壯士》即為當時的代表作。請問：", "stem": "民國　60　年代，臺灣拍攝許多愛國電影，如鼓吹中國抗日精神的《四行倉庫》，或呈現國軍英勇行為的《黃埔軍魂》，這是因為臺灣當時遭逢什麼變局？", "opts": {"A": "國共內戰", "B": "退出聯合國", "C": "二二八事件", "D": "中華民國政府退守臺灣。"}, "full_html": "民國　60　年代，臺灣拍攝許多愛國電影，如鼓吹中國抗日精神的《四行倉庫》，或呈現國軍英勇行為的《黃埔軍魂》，這是因為臺灣當時遭逢什麼變局？　(Ａ)國共內戰　(Ｂ)退出聯合國　(Ｃ)二二八事件　(Ｄ)中華民國政府退守臺灣。", "grp_n": 3, "sub_n": 4, "answer": "B", "id": 28}, {"section": "【歷史L6平時測驗卷】", "type": "mc", "group_context": "", "stem": "臺灣的文化氛圍歷經幾個階段的演變，下列配對何者正確？", "opts": {"A": "民國 30年代，鄉土文學", "B": "民國 40　年代，美國流行文化", "C": "民國 50年代，多元文化", "D": "民國 60　年代，中華文化。"}, "full_html": "臺灣的文化氛圍歷經幾個階段的演變，下列配對何者正確？\n(A)民國 30年代，鄉土文學\n(B)民國 40　年代，美國流行文化\n(C)民國 50年代，多元文化\n(D)民國 60　年代，中華文化。", "grp_n": null, "sub_n": null, "answer": "B", "id": 29}, {"section": "【歷史L6平時測驗卷】", "type": "mc", "group_context": "", "stem": "ICRT　的前身為駐臺美軍廣播電臺，曾獨家放送貓王、披頭四等流行歌曲，成為臺灣人吸收美國文化的重要來源。上述現象的歷史背景為何？", "opts": {"A": "解嚴後多元文化興起", "B": "臺灣經濟邁向自由化", "C": "美國提供臺灣軍事、經濟援助", "D": "政府設立加工出口區，積極吸引外資。"}, "full_html": "ICRT　的前身為駐臺美軍廣播電臺，曾獨家放送貓王、披頭四等流行歌曲，成為臺灣人吸收美國文化的重要來源。上述現象的歷史背景為何？\n(A)解嚴後多元文化興起\n(B)臺灣經濟邁向自由化\n(C)美國提供臺灣軍事、經濟援助\n(D)政府設立加工出口區，積極吸引外資。", "grp_n": null, "sub_n": null, "answer": "C", "id": 30}, {"section": "【歷史100】", "type": "mc", "group_context": "", "stem": "民國　38　年起，政府開始實施一連串經濟改革，穩定臺灣經濟。民國　40　年代，政府提出「進口替代」的策略，其目的為何？", "opts": {"A": "保護國內工業", "B": "促進產業升級", "C": "研發新的農產品", "D": "設立加工出口區。"}, "full_html": "民國　38　年起，政府開始實施一連串經濟改革，穩定臺灣經濟。民國　40　年代，政府提出「進口替代」的策略，其目的為何？　\n(Ａ)保護國內工業　(Ｂ)促進產業升級　(Ｃ)研發新的農產品　(Ｄ)設立加工出口區。", "grp_n": null, "sub_n": null, "answer": "A", "id": 31}, {"section": "【歷史100】", "type": "mc", "group_context": "", "stem": "中華人民共和國與美國建交後，開始對臺灣採取何種策略？", "opts": {"A": "和平統戰", "B": "三不政策", "C": "彈性外交", "D": "務實外交。"}, "full_html": "中華人民共和國與美國建交後，開始對臺灣採取何種策略？　\n(Ａ)和平統戰　(Ｂ)三不政策　(Ｃ)彈性外交　(Ｄ)務實外交。", "grp_n": null, "sub_n": null, "answer": "A", "id": 32}, {"section": "【歷史100】", "type": "mc", "group_context": "", "stem": "王先生是在中國福建經商的臺商，在金門與廈門兩地，他看到如附圖兩則不同的宣傳標語。設立這些標語的時代背景為何？\n<img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAbMAAABcCAMAAADTVqtWAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAMAUExURf///wAAAM7OzhAIEMXFxa21tUpKSubm3iEhGdbOzu/37yEhKSkxMXtzc+/m70JCOpSUlDFCEBBC5hAQ5hBCtRAQtVpSWmucnBAZjJQZWsXvtUIZWhlKWmsZWr1a5r1SWr0Q5r1SEL1arb0ZWr0Qrb0ZEL2MWr2MEBAZEGNjWkLvnEKcGUKcnJTvnGvv3mvvnJTF3mvvWkLFWkLF3kJzWkJz3mvvGULFGULFnEJzGUJznJTFnGvF3mvFnJRC5oyUY0JC5kIQ5pQQ5kJCtUIQtZRCtZQQtWtC5msQ5mtCtWsQtWNCEL29Wr29EGMQEIx7jEIZjJQZjBlKjIxKWmsZjO9a5u9SWu8Q5u9SEO9are8ZWu8Qre8ZEO+MWu+MEDoxOnNzhAgIAO+lrb175r1Se70x5r1SMb17rb0Ze70xrb0ZMb2Me72MMc6lrWtza7W9rUJKe9be3pRKhL3vjL3vOmtKhL3vY73vEJRCEO+9Wu+9EJQQEObOrWNCMb29e729MWMQMeal1hAIWu975u9Se+8x5u9SMe97re8Ze+8xre8ZMe+Me++MMe/vvb2c5mNja+/vjO/vOu/vY+/vEJSczpRzOmuczmtzOpRzzpRzEGtzzmtzEL3v5q2lpZycpZRCMe+9e++9MZQQMWOUY5S9axDvaxDv7xCcaxCc75S9KRDvKRDvrRCcKRCcrToQEGtzpWu9axDFaxDF7xBzaxBz72u9KRDFKRDFrRBzKRBzrQhCEJS9ShDvShDvzhCcShCczpS9CBDvCBDvjBCcCBCcjGu9ShDFShDFzhBzShBzzmu9CBDFCBDFjBBzCBBzjOal9xApWr295pTv75Tva0Lva0Lv75Sc70Kca0Kc75SUOpTvKULvKWuc72uUOpRz75SUEGtz72uUEJTvzpTvSkLvSkLvzkKcSkKczpTvCELvCAhCMToQMZRzpZRrY+bO773O5gghMc7v/wgIKSEIELWcvQgAIe/OzsXOpbXOzv/m/wAIEK21vRAAAL21vcXOxQAAAJUnn/IAAAEAdFJOU////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////// let queue=[], cur=0, round=1;
let roundWrongIds=new Set();
let roundGuessedIds=new Set();
let roundWrongAns={};
let roundTotal=0;
let sessionWrongIds=new Set();
let sessionWrongAns={};
let correct1=0, totalWrong=0;
let answered=false;
let selectedOptKey=null;

document.getElementById('total-count').textContent = QUESTIONS.length;

const SAVE_KEY = 'hist_quiz_v1';

function saveProgress() {
  const state = {
    queue, cur, round,
    roundWrongIds: [...roundWrongIds],
    roundGuessedIds: [...roundGuessedIds],
    roundWrongAns,
    sessionWrongIds: [...sessionWrongIds],
    sessionWrongAns,
    correct1, totalWrong,
    ts: Date.now()
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  const btn = document.getElementById('save-btn');
  btn.textContent = '✅ 已暫存';
  btn.classList.add('saved');
  setTimeout(() => {
    btn.textContent = '💾 暫存進度';
    btn.classList.remove('saved');
  }, 1800);
}

function loadSaved() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); }
  catch(e) { return null; }
}

function restoreProgress() {
  const s = loadSaved();
  if (!s) return;
  queue = s.queue; cur = s.cur; round = s.round;
  roundWrongIds = new Set(s.roundWrongIds);
  roundGuessedIds = new Set(s.roundGuessedIds || []);
  roundWrongAns = s.roundWrongAns;
  sessionWrongIds = new Set(s.sessionWrongIds);
  sessionWrongAns = s.sessionWrongAns;
  correct1 = s.correct1; totalWrong = s.totalWrong;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('save-btn').classList.remove('hidden');
  showQ();
}

window.addEventListener('load', () => {
  const s = loadSaved();
  if (!s) return;
  const d = new Date(s.ts);
  const ts = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const btn = document.getElementById('restore-btn');
  btn.textContent = `↩ 繼續上次進度（${ts}）`;
  btn.classList.remove('hidden');
});

function startQuiz(){
  localStorage.removeItem(SAVE_KEY);
  document.getElementById('restore-btn').classList.add('hidden');
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('save-btn').classList.remove('hidden');
  queue = QUESTIONS.map((_,i)=>i);
  shuffle(queue);
  round=1; roundTotal=queue.length;
  roundWrongIds=new Set(); roundGuessedIds=new Set(); roundWrongAns={};
  sessionWrongIds=new Set(); sessionWrongAns={};
  correct1=0; totalWrong=0; cur=0;
  showQ();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function showQ(){
  answered=false; selectedOptKey=null;
  const q=QUESTIONS[queue[cur]];

  const pct=(cur/queue.length)*100;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`第 ${cur+1} / ${queue.length} 題`;
  document.getElementById('round-badge').textContent=
    round===1?'第一輪':`第 ${round} 輪（錯題回收）`;

  document.getElementById('section-tag').textContent=q.section;

  const gc=document.getElementById('group-context');
  if(q.group_context){ gc.innerHTML=q.group_context; gc.classList.remove('hidden'); }
  else { gc.classList.add('hidden'); }

  let stemHTML=q.stem||'';
  if(q.sub_n) stemHTML=`<span style="color:#1d4e89;font-weight:700;">第(${q.sub_n})小題　</span>`+stemHTML;
  document.getElementById('question-stem').innerHTML=stemHTML;

  document.getElementById('feedback').style.display='none';
  document.getElementById('feedback').className='';
  document.getElementById('confirm-btn').style.display='none';
  const gb=document.getElementById('guessed-btn');
  gb.style.display='none'; gb.disabled=false;
  gb.textContent='🎲 我是用猜的，加入回收'; gb.classList.remove('marked');
  document.getElementById('next-btn').style.display='none';

  const optsEl=document.getElementById('options');
  optsEl.innerHTML='';
  const opts=q.opts||{};

  if(Object.keys(opts).length===4){
    ['A','B','C','D'].forEach(k=>{
      const btn=document.createElement('button');
      btn.className='opt-btn';
      btn.innerHTML=`<span class="lbl">${k}</span><span>${opts[k]}</span>`;
      btn.onclick=()=>selectOpt(k, btn, null);
      optsEl.appendChild(btn);
    });
  } else {
    const disp=document.createElement('div');
    disp.id='img-opt-display';
    disp.innerHTML=q.full_html||'';
    optsEl.appendChild(disp);
    const grid=document.createElement('div');
    grid.className='abcd-grid';
    ['A','B','C','D'].forEach(k=>{
      const btn=document.createElement('button');
      btn.className='abcd-btn';
      btn.textContent=k;
      btn.onclick=()=>selectOpt(k, null, btn);
      grid.appendChild(btn);
    });
    optsEl.appendChild(grid);
  }
}

function selectOpt(k, optBtn, abcdBtn){
  if(answered) return;
  selectedOptKey=k;
  document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.abcd-btn').forEach(b=>b.classList.remove('selected'));
  if(optBtn) optBtn.classList.add('selected');
  if(abcdBtn) abcdBtn.classList.add('selected');
  document.getElementById('confirm-btn').style.display='block';
}

function confirmAnswer(){
  if(!selectedOptKey || answered) return;
  answered=true;
  const chosen=selectedOptKey;
  const q=QUESTIONS[queue[cur]];
  const correct=q.answer;
  const isOk=(chosen===correct);

  document.getElementById('confirm-btn').style.display='none';

  if(document.querySelectorAll('.opt-btn').length>0){
    document.querySelectorAll('.opt-btn').forEach((b,i)=>{
      const k=['A','B','C','D'][i];
      b.classList.remove('selected');
      if(k===correct) b.classList.add('reveal');
    });
    document.querySelectorAll('.opt-btn')[['A','B','C','D'].indexOf(chosen)]
      .classList.add(isOk?'correct':'wrong');
  } else {
    document.querySelectorAll('.abcd-btn').forEach(b=>{
      b.classList.remove('selected');
      if(b.textContent===correct) b.classList.add('reveal');
      if(b.textContent===chosen) b.classList.add(isOk?'correct':'wrong');
    });
  }

  const fb=document.getElementById('feedback');
  fb.style.display='block';
  if(isOk){
    fb.className='ok'; fb.textContent='✓ 答對了！';
    if(round===1) correct1++;
    document.getElementById('guessed-btn').style.display='block';
  } else {
    fb.className='err'; fb.textContent=`✗ 答錯了，正確答案是 ${correct}`;
    const qid=queue[cur];
    roundWrongIds.add(qid);
    roundWrongAns[qid]=chosen;
    if(!sessionWrongIds.has(qid)) sessionWrongAns[qid]=chosen;
    sessionWrongIds.add(qid);
    totalWrong++;
  }
  document.getElementById('next-btn').style.display='block';
}

function markAsGuessed(){
  const qid=queue[cur];
  roundWrongIds.add(qid);
  roundGuessedIds.add(qid);
  sessionWrongIds.add(qid);
  if(!sessionWrongAns[qid]) sessionWrongAns[qid]='（猜對）';
  const btn=document.getElementById('guessed-btn');
  btn.textContent='🎲 已標記為猜對，加入下輪回收';
  btn.classList.add('marked'); btn.disabled=true;
}

function nextQuestion(){
  cur++;
  if(cur>=queue.length){ showRoundEnd(); } else { showQ(); }
}

function showRoundEnd(){
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('round-end-screen').classList.remove('hidden');

  const recycleCount=roundWrongIds.size;
  const guessedCount=roundGuessedIds.size;
  const wrongOnlyCount=recycleCount-guessedCount;
  const correctCount=queue.length-recycleCount;
  const allDone=(recycleCount===0);

  document.getElementById('re-emoji').textContent=allDone?'🎉':'📝';
  document.getElementById('re-title').textContent=allDone?'全部答對了！':`第 ${round} 輪完成`;

  if(allDone){
    document.getElementById('re-desc').textContent=`恭喜完成全部 ${round} 輪練習！`;
  } else {
    const parts=[];
    if(wrongOnlyCount>0) parts.push(`答錯 ${wrongOnlyCount} 題`);
    if(guessedCount>0) parts.push(`猜對 ${guessedCount} 題`);
    document.getElementById('re-desc').textContent=
      `${parts.join('、')}，共 ${recycleCount} 題加入下輪回收。`;
  }

  document.getElementById('re-total').textContent=queue.length;
  document.getElementById('re-correct').textContent=correctCount;
  document.getElementById('re-wrong').textContent=recycleCount;
  document.getElementById('re-wrong-lbl').textContent=
    guessedCount>0?`回收（含 ${guessedCount} 猜）`:'答錯（回收）';
  document.getElementById('re-rounds').textContent=round;

  const nextBtn=document.getElementById('re-next-btn');
  const exportBtn=document.getElementById('re-export-btn');
  if(allDone){
    nextBtn.style.display='none';
    exportBtn.style.display='none';
  } else {
    nextBtn.textContent=`開始第 ${round+1} 輪（${recycleCount} 題）`;
    nextBtn.style.display='block';
    exportBtn.style.display='block';
  }
}

function startNextRound(){
  const ids=[...roundWrongIds];
  round++;
  roundTotal=ids.length;
  roundWrongIds=new Set(); roundGuessedIds=new Set(); roundWrongAns={};
  queue=ids; shuffle(queue); cur=0;
  document.getElementById('round-end-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  showQ();
}

function exportRoundPDF(){
  const wrongIds=[...roundWrongIds];
  const wrongAns={...roundWrongAns};
  buildAndPrintPDF(wrongIds, wrongAns, round);
}

function buildAndPrintPDF(wrongIds, wrongAns, roundNum){
  const wrongList=wrongIds.sort((a,b)=>a-b).map(i=>QUESTIONS[i]);
  const now=new Date();
  const dateStr=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;

  let cards=''; let lastSec='';
  wrongList.forEach((q,n)=>{
    if(q.section!==lastSec){
      cards+=`<div class="pq-sec">${q.section}</div>`;
      lastSec=q.section;
    }
    const subLabel=q.sub_n?`第(${q.sub_n})小題　`:'';
    const ctx=q.group_context?`<div class="pq-ctx">${q.group_context}</div>`:'';
    const stem=`<div class="pq-stem">${subLabel}${q.stem||''}</div>`;
    let optsHtml='';
    const opts=q.opts||{};
    if(Object.keys(opts).length===4){
      optsHtml='<div class="pq-opts">';
      ['A','B','C','D'].forEach(k=>{
        optsHtml+=`<div class="pq-opt"><span class="pq-lbl">${k}</span>${opts[k]}</div>`;
      });
      optsHtml+='</div>';
    } else {
      optsHtml=`<div class="pq-full">${q.full_html||''}</div>`;
    }
    cards+=`<div class="pq-card"><div class="pq-num">第 ${n+1} 題</div>${ctx}${stem}${optsHtml}</div>`;
  });

  let ansRows='';
  wrongList.forEach((q,n)=>{
    const myAns=wrongAns[q.id]||'─';
    ansRows+=`<tr><td>${n+1}</td><td class="wrong-cell">${myAns}</td><td class="right-cell">${q.answer}</td></tr>`;
  });

  const html=`<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<title>地理錯題 第${roundNum}輪</title>
<style>
  body{font-family:-apple-system,'Noto Sans TC',sans-serif;margin:0;padding:20px;color:#111;}
  h2{color:#1d4e89;margin-bottom:4px;}
  .sub{color:#888;font-size:.85rem;margin-bottom:24px;}
  .pq-sec{font-weight:700;font-size:.82rem;background:#dbeafe;color:#1d4e89;
    padding:3px 12px;border-radius:999px;display:inline-block;margin:20px 0 10px;}
  .pq-card{border:1px solid #ddd;border-radius:12px;padding:16px;margin-bottom:14px;page-break-inside:avoid;}
  .pq-num{font-size:.75rem;color:#999;margin-bottom:6px;}
  .pq-ctx{background:#f6f6f6;border-left:3px solid #5b9bd5;padding:8px 12px;
    border-radius:0 6px 6px 0;margin-bottom:10px;font-size:.9rem;line-height:1.7;}
  .pq-ctx img,.pq-full img{max-width:100%;border-radius:6px;margin:4px 0;display:block;}
  .pq-stem{font-size:.97rem;line-height:1.8;margin-bottom:12px;}
  .pq-stem img{max-width:100%;border-radius:6px;margin:4px 0;display:block;}
  .pq-opts{display:flex;flex-direction:column;gap:6px;}
  .pq-opt{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
    border-radius:8px;border:1px solid #eee;font-size:.9rem;line-height:1.6;}
  .pq-lbl{background:#e8e8e8;border-radius:5px;min-width:24px;height:24px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.82rem;flex-shrink:0;}
  .pq-full{font-size:.9rem;line-height:1.8;}
  .ans-page{page-break-before:always;padding-top:20px;}
  .ans-page h3{color:#1d4e89;margin-bottom:16px;font-size:1.2rem;}
  .ans-table{border-collapse:collapse;width:100%;max-width:360px;font-size:.95rem;}
  .ans-table th,.ans-table td{border:1px solid #ddd;padding:8px 16px;text-align:center;}
  .ans-table th{background:#dbeafe;color:#1d3557;font-weight:700;}
  .wrong-cell{color:#c1121f;font-weight:700;}
  .right-cell{color:#1d4e89;font-weight:700;}
  @media print{body{padding:0;}@page{margin:1.5cm;}}
</style></head><body>
<h2>地理錯題整理 · 第 ${roundNum} 輪</h2>
<div class="sub">練習日期：${dateStr}　本輪答錯 ${wrongList.length} 題</div>
${cards}
<div class="ans-page">
  <h3>答案</h3>
  <table class="ans-table">
    <thead><tr><th>題號</th><th>你的答案</th><th>正確答案</th></tr></thead>
    <tbody>${ansRows}</tbody>
  </table>
</div>
</body></html>`;

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`歷史錯題_第${roundNum}輪.html`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

function restartQuiz(){
  localStorage.removeItem(SAVE_KEY);
  document.getElementById('save-btn').classList.add('hidden');
  document.getElementById('round-end-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
}
</script>
</body>
</html>
